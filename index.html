<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WonderGear | Tecnologia de Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7c3aed;     /* Roxo */
            --accent: #db2777;      /* Rosa Neon */
            --secondary: #f59e0b;   /* Dourado */
            --dark-bg: #0f172a;     /* Fundo Escuro */
            --card-bg: #1e293b;     /* Fundo dos Cards */
            --white: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-bg);
            color: var(--white);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* NAVEGAÇÃO */
        nav {
            position: fixed;
            top: 0; width: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo-box { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .logo-img { width: 40px; filter: drop-shadow(0 0 10px var(--primary)); }
        .logo-name {
            font-weight: 900; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px;
            background: linear-gradient(to right, var(--primary), var(--accent), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .menu-tabs { display: flex; gap: 15px; }
        .menu-tabs span { font-size: 0.85rem; font-weight: 700; color: #64748b; text-transform: uppercase; cursor: pointer; }
        .menu-tabs span.active { color: var(--white); border-bottom: 2px solid var(--primary); }

        /* SEÇÕES */
        section { padding: 110px 20px 40px; display: none; min-height: 100vh; max-width: 600px; margin: 0 auto; }
        section.active { display: block; animation: slideUp 0.5s ease; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* HERO CARD (DESTAQUE) */
        .hero-card { text-align: center; }
        .badge { background: rgba(124, 58, 237, 0.1); color: var(--primary); padding: 5px 15px; border-radius: 50px; font-size: 0.7rem; font-weight: 800; display: inline-block; margin-bottom: 20px; border: 1px solid rgba(124, 58, 237, 0.2); }
        h1 { font-size: 2.2rem; font-weight: 900; line-height: 1.1; margin-bottom: 15px; }
        h1 span { color: var(--secondary); }

        .main-product-img {
            width: 100%; max-width: 320px; border-radius: 30px; margin: 20px 0;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.5));
            animation: flutuar 4s ease-in-out infinite;
        }
        @keyframes flutuar { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .price-container { margin: 25px 0; }
        .old-price { color: #64748b; text-decoration: line-through; font-size: 1.1rem; }
        .new-price { font-size: 3rem; font-weight: 900; color: var(--white); display: block; margin-top: -5px; }

        .btn-checkout {
            background: linear-gradient(90deg, var(--primary), var(--accent));
            color: white; padding: 20px; border-radius: 15px; text-decoration: none;
            font-weight: 900; display: block; font-size: 1.1rem; border: none;
            text-transform: uppercase; cursor: pointer; width: 100%;
            box-shadow: 0 10px 25px rgba(124, 58, 237, 0.3);
        }

        /* GRID DE PRODUTOS */
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .product-item {
            background: var(--card-bg); padding: 15px; border-radius: 20px;
            text-align: center; border: 1px solid rgba(255,255,255,0.03);
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .product-item img { width: 100%; border-radius: 15px; margin-bottom: 10px; height: 120px; object-fit: cover; }
        .product-item h3 { font-size: 0.8rem; color: #cbd5e1; margin-bottom: 5px; height: 40px; overflow: hidden; }
        .product-item p { color: var(--secondary); font-weight: 900; margin-bottom: 10px; }
        .btn-buy { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 10px; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; cursor: pointer; }

        /* WHATSAPP FLOAT */
        .whatsapp-btn {
            position: fixed; bottom: 20px; right: 20px; background: #25d366;
            width: 60px; height: 60px; border-radius: 50%; display: flex;
            justify-content: center; align-items: center; font-size: 2rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); z-index: 2000; text-decoration: none;
        }

        footer { text-align: center; padding: 60px 20px; font-size: 0.7rem; color: #475569; }
    </style>
</head>
<body>

    <nav>
        <div class="logo-box" onclick="irPara('destaque')">
            <img src="logo.PNG" alt="WG" class="logo-img" onerror="this.style.display='none'">
            <div class="logo-name">WonderGear</div>
        </div>
        <div class="menu-tabs">
            <span id="tab-destaque" class="active" onclick="irPara('destaque')">Destaque</span>
            <span id="tab-loja" onclick="irPara('loja')">Catálogo</span>
        </div>
    </nav>

    <section id="destaque" class="active">
        <div class="hero-card">
            <div class="badge">Power Bank Elite</div>
            <h1>Energia que <span>não acaba.</span></h1>
            <p style="color: #94a3b8; font-size: 0.9rem;">Power Bank 50.000mAh. Ideal para viagens e trabalho intenso.</p>
            
            <img src="produto.PNG" class="main-product-img" alt="Power Bank" onerror="this.src='https://images.unsplash.com/photo-1609091839311-d5365f9ff1c5?q=80&w=400'">

            <div class="price-container">
                <span class="old-price">R$ 299,90</span>
                <span class="new-price">R$ 169,90</span>
                <p style="color: #22c55e; font-weight: bold; font-size: 0.8rem; margin-top: 10px;">📦 FRETE GRÁTIS PARA CORDEIRÓPOLIS</p>
            </div>

            <button class="btn-checkout" onclick="window.open('https://pagseguro.uol.com.br/LINK_DO_POWERBANK', '_blank')">Comprar Agora</button>
        </div>
    </section>

    <section id="loja">
        <h2 style="text-align: center; margin-bottom: 30px; font-weight: 900;">Tecnologia de Elite</h2>
        <div class="product-grid" id="grid-produtos">
            </div>
    </section>

    <a href="https://wa.me/5511999999999?text=Olá%20WonderGear!%20Estou%20com%20uma%20dúvida." target="_blank" class="whatsapp-btn">
        <span style="color: white;">💬</span>
    </a>

    <footer>
        <p>&copy; 2026 WonderGear Brasil. <br> Pagamentos seguros via PagSeguro.</p>
    </footer>

    <script>
        // Função para mudar de aba
        function irPara(id) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.menu-tabs span').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('tab-' + id).classList.add('active');
            window.scrollTo(0, 0);
        }

        // BANCO DE DADOS - ADICIONE SEUS LINKS AQUI
        const produtos = [
            {
                nome: 'Cabo Titanium Turbo 6A',
                preco: 40.00,
                img: 'produto_shopee.jpg', // Lembre de salvar a foto com esse nome
                link: 'https://pagseguro.uol.com.br/LINK_DE_40_REAIS'
            },
            {
                nome: 'Fonte Turbo 20W Original',
                preco: 89.90,
                img: 'https://images.unsplash.com/photo-1606229365485-93a3b8ee0d25?q=80&w=300',
                link: 'https://pagseguro.uol.com.br/LINK_FONTE'
            },
            {
                nome: 'Fone TWS Air Pro 3',
                preco: 129.00,
                img: 'https://images.unsplash.com/photo-1590658268037-6bf12165a8df?q=80&w=300',
                link: 'https://pagseguro.uol.com.br/LINK_FONE'
            },
            {
                nome: 'Película Cerâmica 9D',
                preco: 25.00,
                img: 'https://images.unsplash.com/photo-1541140532154-b024d715b909?q=80&w=300',
                link: 'https://pagseguro.uol.com.br/LINK_PELICULA'
            }
        ];

        // Renderiza os produtos na tela
        function renderizar() {
            const grid = document.getElementById('grid-produtos');
            grid.innerHTML = ''; // Limpa antes de carregar
            produtos.forEach(p => {
                grid.innerHTML += `
                    <div class="product-item">
                        <img src="${p.img}" alt="${p.nome}" onerror="this.src='https://via.placeholder.com/150/1e293b/white?text=WonderGear'">
                        <div>
                            <h3>${p.nome}</h3>
                            <p>R$ ${p.preco.toFixed(2).replace('.', ',')}</p>
                            <button class="btn-buy" onclick="window.open('${p.link}', '_blank')">Comprar</button>
                        </div>
                    </div>
                `;
            });
        }

        renderizar();
    </script>
</body>
</html>
