<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WonderGear | Tecnologia de Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7c3aed;     /* Roxo */
            --accent: #db2777;      /* Rosa Neon */
            --secondary: #f59e0b;   /* Dourado */
            --dark-bg: #0f172a;     /* Fundo Escuro */
            --card-bg: #1e293b;     /* Fundo dos Cards */
            --white: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-bg);
            color: var(--white);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* NAVEGAÇÃO */
        nav {
            position: fixed;
            top: 0; width: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo-box { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .logo-img { width: 40px; filter: drop-shadow(0 0 10px var(--primary)); }
        .logo-name {
            font-weight: 900; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px;
            background: linear-gradient(to right, var(--primary), var(--accent), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .menu-tabs { display: flex; gap: 15px; }
        .menu-tabs span { font-size: 0.85rem; font-weight: 700; color: #64748b; text-transform: uppercase; cursor: pointer; }
        .menu-tabs span.active { color: var(--white); border-bottom: 2px solid var(--primary); }

        /* SEÇÕES */
        section { padding: 110px 20px 40px; display: none; min-height: 100vh; max-width: 600px; margin: 0 auto; }
        section.active { display: block; animation: slideUp 0.5s ease; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* HERO CARD (DESTAQUE) */
        .hero-card { text-align: center; }
        .badge { background: rgba(124, 58, 237, 0.1); color: var(--primary); padding: 5px 15px; border-radius: 50px; font-size: 0.7rem; font-weight: 800; display: inline-block; margin-bottom: 20px; border: 1px solid rgba(124, 58, 237, 0.2); }
        h1 { font-size: 2.2rem; font-weight: 900; line-height: 1.1; margin-bottom: 15px; }
        h1 span { color: var(--secondary); }

        .main-product-img {
            width: 100%; max-width: 320px; border-radius: 30px; margin: 20px 0;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.5));
            animation: flutuar 4s ease-in-out infinite;
        }
        @keyframes flutuar { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .price-container { margin: 25px 0; }
        .old-price { color: #64748b; text-decoration: line-through; font-size: 1.1rem; }
        .new-price { font-size: 3rem; font-weight: 900; color: var(--white); display: block; margin-top: -5px; }

        .btn-checkout {
            background: linear-gradient(90deg, var(--primary), var(--accent));
            color: white; padding: 20px; border-radius: 15px; text-decoration: none;
            font-weight: 900; display: block; font-size: 1.1rem; border: none;
            text-transform: uppercase; cursor: pointer; width: 100%;
            box-shadow: 0 10px 25px rgba(124, 58, 237, 0.3);
        }

        /* GRID DE PRODUTOS */
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .product-item {
            background: var(--card-bg); padding: 15px; border-radius: 20px;
            text-align: center; border: 1px solid rgba(255,255,255,0.03);
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .product-item img { width: 100%; border-radius: 15px; margin-bottom: 10px; height: 120px; object-fit: cover; cursor: pointer; }
        .product-item h3 { font-size: 0.8rem; color: #cbd5e1; margin-bottom: 5px; height: 40px; overflow: hidden; cursor: pointer; }
        .product-item p { color: var(--secondary); font-weight: 900; margin-bottom: 10px; }
        .btn-buy { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 10px; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; cursor: pointer; }

        /* MODAL DE DESCRIÇÃO */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 3000;
            justify-content: center; align-items: center; padding: 20px;
        }
        .modal-content {
            background: var(--card-bg); width: 100%; max-width: 500px;
            border-radius: 30px; padding: 30px; position: relative;
            animation: modalIn 0.3s ease-out; border: 1px solid rgba(255,255,255,0.1);
        }
        @keyframes modalIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 2rem; color: #64748b; cursor: pointer; }
        .modal-img { width: 100%; border-radius: 20px; margin-bottom: 20px; }
        .modal-desc { font-size: 0.9rem; color: #cbd5e1; margin: 15px 0 25px; }

        /* WHATSAPP FLOAT */
        .whatsapp-btn {
            position: fixed; bottom: 20px; right: 20px; background: #25d366;
            width: 60px; height: 60px; border-radius: 50%; display: flex;
            justify-content: center; align-items: center; font-size: 2rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); z-index: 2000; text-decoration: none;
        }

        footer { text-align: center; padding: 60px 20px; font-size: 0.7rem; color: #475569; }
    </style>
</head>
<body>

    <nav>
        <div class="logo-box" onclick="irPara('destaque')">
            <img src="logo.PNG" alt="WG" class="logo-img" onerror="this.style.display='none'">
            <div class="logo-name">WonderGear</div>
        </div>
        <div class="menu-tabs">
            <span id="tab-destaque" class="active" onclick="irPara('destaque')">Destaque</span>
            <span id="tab-loja" onclick="irPara('loja')">Catálogo</span>
        </div>
    </nav>

    <div id="modal-produto" class="modal" onclick="fecharModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-modal" onclick="fecharModal()">&times;</span>
            <img id="modal-img" src="" class="modal-img">
            <h2 id="modal-titulo" style="font-weight: 900;"></h2>
            <p id="modal-preco" style="color: var(--secondary); font-weight: 900; font-size: 1.5rem;"></p>
            <div id="modal-desc" class="modal-desc"></div>
            <button id="modal-btn" class="btn-checkout">Comprar Agora</button>
        </div>
    </div>

    <section id="destaque" class="active">
        <div class="hero-card">
            <div class="badge">Power Bank Elite</div>
            <h1>Energia que <span>não acaba.</span></h1>
            <p style="color: #94a3b8; font-size: 0.9rem;">Power Bank 50.000mAh. Ideal para viagens e trabalho intenso.</p>
            
            <img src="produto.PNG" class="main-product-img" alt="Power Bank" onclick="abrirDestaque()" style="cursor: pointer;">

            <div class="price-container">
                <span class="old-price">R$ 299,90</span>
                <span class="new-price">R$ 169,90</span>
                <p style="color: #22c55e; font-weight: bold; font-size: 0.8rem; margin-top: 10px;">📦 FRETE GRÁTIS PARA CORDEIRÓPOLIS</p>
            </div>

            <button class="btn-checkout" onclick="window.open('https://pagseguro.uol.com.br/LINK_DO_POWERBANK', '_blank')">Comprar Agora</button>
        </div>
    </section>

    <section id="loja">
        <h2 style="text-align: center; margin-bottom: 30px; font-weight: 900;">Tecnologia de Elite</h2>
        <div class="product-grid" id="grid-produtos"></div>
    </section>

    <a href="https://wa.me/5519993405480?text=Olá%20WonderGear!%20Estou%20com%20uma%20dúvida." target="_blank" class="whatsapp-btn">
        <span style="color: white;">💬</span>
    </a>

    <footer>
        <p>&copy; 2026 WonderGear Brasil. <br> Pagamentos seguros via PagSeguro/InfinitePay.</p>
    </footer>

    <script>
        function irPara(id) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.menu-tabs span').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('tab-' + id).classList.add('active');
            window.scrollTo(0, 0);
        }

        // BANCO DE DADOS ATUALIZADO COM DESCRIÇÕES
        const produtos = [
            {
                nome: 'Projetor HY300 Portátil Smart Android 11 4K',
                preco: 230.00,
                desc: 'Transforme seu quarto em um cinema! Projetor com Android 11, resolução 4K, Wi-Fi e Bluetooth. Imagem nítida de até 130 polegadas.',
                img: 'produto_shopee.JPG',
                link: 'https://invoice.infinitepay.io/wondergear/lWENlMIUz'
            },
            {
                nome: 'Fonte Turbo 20W Original',
                preco: 89.90,
                desc: 'Carregamento ultra rápido para seu smartphone. Tecnologia inteligente que não vicia a bateria.',
                img: 'https://images.unsplash.com/photo-1606229365485-93a3b8ee0d25?q=80&w=300',
                link: 'https://pagseguro.uol.com.br/LINK_FONTE'
            },
            {
                nome: 'Fone TWS Air Pro 3',
                preco: 129.00,
                desc: 'Qualidade de áudio Premium com cancelamento de ruído. Bateria de longa duração e conexão instantânea Bluetooth 5.3.',
                img: 'https://images.unsplash.com/photo-1590658268037-6bf12165a8df?q=80&w=300',
                link: 'https://pagseguro.uol.com.br/LINK_FONE'
            },
            {
                nome: 'Película Cerâmica 9D',
                preco: 25.00,
                desc: 'A proteção definitiva! Flexível, não quebra e protege contra riscos e quedas extremas.',
                img: 'https://images.unsplash.com/photo-1541140532154-b024d715b909?q=80&w=300',
                link: 'https://pagseguro.uol.com.br/LINK_PELICULA'
            }
        ];

        function abrirModal(index) {
            const p = produtos[index];
            document.getElementById('modal-img').src = p.img;
            document.getElementById('modal-titulo').innerText = p.nome;
            document.getElementById('modal-preco').innerText = `R$ ${p.preco.toFixed(2).replace('.', ',')}`;
            document.getElementById('modal-desc').innerText = p.desc;
            document.getElementById('modal-btn').onclick = () => window.open(p.link, '_blank');
            document.getElementById('modal-produto').style.display = 'flex';
        }

        function abrirDestaque() {
            // Abre a descrição do produto principal (Power Bank)
            const powerBank = {
                nome: 'Power Bank Elite 50.000mAh',
                preco: 169.90,
                desc: 'Capacidade real para carregar seu celular até 10 vezes. Possui lanterna LED e carregamento rápido para 3 aparelhos ao mesmo tempo.',
                img: 'produto.PNG',
                link: 'https://pagseguro.uol.com.br/LINK_DO_POWERBANK'
            };
            document.getElementById('modal-img').src = powerBank.img;
            document.getElementById('modal-titulo').innerText = powerBank.nome;
            document.getElementById('modal-preco').innerText = `R$ ${powerBank.preco.toFixed(2).replace('.', ',')}`;
            document.getElementById('modal-desc').innerText = powerBank.desc;
            document.getElementById('modal-btn').onclick = () => window.open(powerBank.link, '_blank');
            document.getElementById('modal-produto').style.display = 'flex';
        }

        function fecharModal() {
            document.getElementById('modal-produto').style.display = 'none';
        }

        function renderizar() {
            const grid = document.getElementById('grid-produtos');
            grid.innerHTML = '';
            produtos.forEach((p, index) => {
                grid.innerHTML += `
                    <div class="product-item">
                        <img src="${p.img}" alt="${p.nome}" onclick="abrirModal(${index})" onerror="this.src='https://via.placeholder.com/150/1e293b/white?text=WonderGear'">
                        <div>
                            <h3 onclick="abrirModal(${index})">${p.nome}</h3>
                            <p>R$ ${p.preco.toFixed(2).replace('.', ',')}</p>
                            <button class="btn-buy" onclick="window.open('${p.link}', '_blank')">Comprar</button>
                        </div>
                    </div>
                `;
            });
        }

        renderizar();
    </script>
</body>
</html>
